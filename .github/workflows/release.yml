name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Maven Central
        run: |
          export PUBLISH_VERSION="${{ steps.version.outputs.version }}"
          export MILL_SONATYPE_USERNAME="${SONATYPE_USERNAME:?SONATYPE_USERNAME is required}"
          export MILL_SONATYPE_PASSWORD="${SONATYPE_PASSWORD:?SONATYPE_PASSWORD is required}"
          export MILL_PGP_PASSPHRASE="${PGP_PASSPHRASE:?PGP_PASSPHRASE is required}"
          export MILL_PGP_SECRET_BASE64="$(echo "$PGP_SECRET" | tr -d '\n\r ')"
          ./mill -i __.publishSonatypeCentral
        env:
          SONATYPE_USERNAME: ${{ secrets.ELEVEN19_SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.ELEVEN19_SONATYPE_PASSWORD }}
          PGP_SECRET: ${{ secrets.ELEVEN19_IO_PGP_SECRET_BASE64 }}
          PGP_PASSPHRASE: ${{ secrets.ELEVEN19_IO_PGP_PASSPHRASE }}
